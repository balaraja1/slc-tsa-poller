name: Poll SLC TSA Wait Times

on:
  schedule:
    # Every 5 minutes from 4:00-6:55am Mountain Time (UTC-6 in April = 10:00-12:55 UTC)
    # Runs April 6-11 only (gate step handles April 11 special case + post-April 11 cutoff)
    - cron: "*/5 10-12 * * *"
    # Summary notification at 6:35am MT = 12:35 UTC
    - cron: "35 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "poll"
        type: choice
        options:
          - poll
          - summary

jobs:
  poll:
    # Run 4:00-6:55am MT daily EXCEPT April 11 (flight day)
    if: >-
      github.event.schedule != '35 12 * * *'
      && (github.event_name != 'workflow_dispatch' || inputs.mode == 'poll')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check date gate (April 6-11 only, April 11 limited)
        id: gate
        run: |
          TODAY=$(date -u +'%m-%d')
          HOUR=$(date -u +'%H')
          MIN=$(date -u +'%M')
          # Stop entirely after April 11
          if [[ "$TODAY" > "04-11" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Past April 11, skipping"
          # On April 11, only poll at ~4:00, ~4:15, ~4:30 MT (10:00, 10:15, 10:30 UTC)
          elif [ "$TODAY" = "04-11" ]; then
            if [ "$HOUR" = "10" ] && ([ "$MIN" -le "05" ] || [ "$MIN" -ge "13" -a "$MIN" -le "17" ] || [ "$MIN" -ge "28" -a "$MIN" -le "32" ]); then
              echo "skip=false" >> "$GITHUB_OUTPUT"
            else
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Poll TSA wait times
        if: steps.gate.outputs.skip != 'true'
        run: python poll.py

      - name: Commit data
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: poll $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase
            git push
          fi

  summary:
    if: github.event.schedule == '35 12 * * *' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'summary')
    runs-on: ubuntu-latest

    steps:
      - name: Check date gate (stop after April 11)
        id: gate
        run: |
          TODAY=$(date -u +'%m-%d')
          if [[ "$TODAY" > "04-11" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Send morning summary
        if: steps.gate.outputs.skip != 'true'
        env:
          BRRR_SECRET: ${{ secrets.BRRR_SECRET }}
        run: python poll.py --summary
