name: Poll SLC TSA Wait Times

on:
  schedule:
    # Every 5 minutes from 4:00-6:55am Mountain Time (UTC-6 in April = 10:00-12:55 UTC)
    - cron: "*/5 10-12 * * *"
    # Summary notification at 6:35am MT = 12:35 UTC
    - cron: "35 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "poll"
        type: choice
        options:
          - poll
          - summary

jobs:
  poll:
    if: github.event.schedule != '35 12 * * *' && (github.event_name != 'workflow_dispatch' || inputs.mode == 'poll')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll TSA wait times
        run: python poll.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: poll $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase
            git push
          fi

  summary:
    if: github.event.schedule == '35 12 * * *' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'summary')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send morning summary
        env:
          BRRR_SECRET: ${{ secrets.BRRR_SECRET }}
        run: python poll.py --summary
